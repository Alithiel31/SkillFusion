name: Auto PR main-dev → main

permissions:
  pull-requests: write
  contents: read

on:
  push:
    branches: [main-dev]

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Créer ou mettre à jour la PR
        uses: repo-sync/pull-request@v2
        with:
          source_branch: main-dev
          destination_branch: main
          pr_title: "🚀 Auto-merge: main-dev → main"
          pr_body: |
            Merge automatique depuis **main-dev**
            
            ✅ Checks doivent être au vert avant de merger
            
            ---
            *Cette PR a été créée automatiquement par GitHub Actions*
          github_token: ${{ secrets.GITHUB_TOKEN }}